<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 Redirect</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-EB9G06L3DL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}

    gtag('js', new Date());
    gtag('config', 'G-EB9G06L3DL');

    gtag("event", "redirect_404", {
      path: location.pathname
    });

    gtag('consent','default',{
      ad_storage:'denied',
      analytics_storage:'denied',
      ad_user_data:'denied',
      ad_personalization:'denied'
    });
  </script>
</head>

<body>
<script>
(function () {
  var origin = location.origin;
  var path = location.pathname;

  // 防止死循环（如果已经在根路径就不跳了）
  if (path === "/" || path === "") return;

  // 去掉首尾 /
  var segments = path.replace(/^\/|\/$/g, "").split("/");

  // 只保留第一级路径
  var first = segments[0];

  // 构造一级路径
  var firstLevelUrl = origin + "/" + first + "/";

  // 如果当前已经是一级路径 → 跳到根目录
  if (segments.length === 1) {
    location.replace(origin + "/");
    return;
  }

  // 否则跳到一级路径
  location.replace(firstLevelUrl);

})();
</script>
</body>
</html>
