assets:
  # compress:
  #   css: false | true | default - development: false, production: true
  #   js: false | true | default - development: false, production: true
  autowrite: true
  source_maps: false
  gzip: false
  js_compressor: 'terser'
  defaults:
    integrity:
      css: false
      js: false
      img: false
  # cache: false | directory | default: .asset-cache
  # cache_type: memory | filesystem | default: filesystem
  # cdn: https://cdn.example.com
  # skip_baseurl_with_cdn: false
  # skip_prefix_with_cdn: false
  # js: { integrity: false } # true on JEKYLL_ENV=production
  # css: { integrity: false } # true on JEKYLL_ENV=production
  # img: { integrity: false } # true on JEKYLL_ENV=production

  prefix: "/assets"
  digest: true

  autoprefixer:
    browsers:
      - "last 2 versions"
      - "IE >= 9"
  #

  assets:
    - "*.png" 
    - "application.js" 
    - "application.css" 
    - "application-dark.css"
  # compress:
  #   css: sass
  #   js: uglifier

  sources:
    - assets/images
    - assets/javascripts
    - assets/stylesheets

  # features:
  #   liquid: true | false | default: false
  #   integrity: true | false | default: false
  #   automatic_img_size: true | false | n(fixnum): 2,4,6,8 | default: true
  #   automatic_img_alt : true | false | default: true


# env: production

plugins: 
    - jekyll-assets
    # - jekyll-sitemap
    # - octopress-minify-html